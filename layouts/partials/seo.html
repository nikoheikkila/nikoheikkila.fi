{{- $description := .Params.description | default .Site.Params.description -}}
{{- $cover := .Params.hero | default .Site.Params.cover -}}
{{- $lang := .Params.lang | default .Site.LanguageCode -}}
<meta name="description" content="{{ $description }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:image" content="{{ $cover }}">
<meta property="og:image:alt" content="{{ .Title }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
{{ if .IsPage }}
  <meta property="og:type" content="article">
  <meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
  <meta property="article:author" content="{{ .Params.author | default .Site.Params.author }}">
  <meta property="article:section" content="Technology">
{{ else }}
  <meta property="og:type" content="website">
{{ end }}
{{ if eq $lang "fi" }}
  <meta property="og:locale" content="fi_FI">
{{ else }}
  <meta property="og:locale" content="en_GB">
{{ end }}

<!-- Mastodon verification -->
<meta name="fediverse:creator" content="{{ .Site.Params.social.mastodon }}">
<link rel="me" href="{{ .Site.Params.social.mastodon }}">

<link rel="canonical" href="{{ .Permalink }}">
