name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Lint Code Style
        run: task lint

      - name: Run unit tests
        run: task test:unit

  component_tests:
    name: Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
      - name: Run component tests
        run: task test:component

  acceptance_tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Cache Gatsby Build Files
        uses: actions/cache@v6
        with:
          path: |
            .cache
            public
          key: ${{ runner.os }}-gatsby-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-gatsby-
            ${{ runner.os }}-

      - name: Build site
        run: task build

      - name: Run E2E Tests
        run: task test:e2e

      - name: Upload static assets
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: static-assets
          retention-days: 1
          path: public/

  deploy-preview:
    name: Deploy to Preview
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    needs: [unit_tests, component_tests, acceptance_tests]
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download static assets
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.acceptance_tests.outputs.artifact_id }}
          path: public

      - name: Deploy
        id: deploy
        uses: ./.github/actions/terraform-site
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_SECRET }}
          workspace: pr-${{ github.event.pull_request.number }}

  lighthouse-preview:
    name: Lighthouse Audit for Preview
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    env:
      LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

    steps:
      - name: Run Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ needs.deploy-preview.outputs.deployment-url }}
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    needs: [unit_tests, component_tests, acceptance_tests]
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download static assets
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.acceptance_tests.outputs.artifact_id }}
          path: public

      - name: Deploy
        id: deploy
        uses: ./.github/actions/terraform-site
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          r2-access-key-id: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_SECRET }}
          workspace: default

      - name: Record deployment
        run: echo "[Open production deploy ↗](${{ steps.deploy.outputs.url }})" >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    name: Lighthouse Audit for Production
    runs-on: ubuntu-latest
    needs: [deploy]
    env:
      LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

    steps:
      - name: Run Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ needs.deploy.outputs.deployment-url }}
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true
