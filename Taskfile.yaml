version: "3"

includes:
  terraform:
    taskfile: ./infra/Taskfile.yml
    dir: ./infra

tasks:
  new:
    desc: Scaffold a new post or page
    interactive: true
    cmds:
      - bun run new.ts

  install:
    desc: Install dependencies with Bun
    run: once
    cmd: bun install --frozen-lockfile

  format:
    desc: Format codebase
    deps: [install]
    cmds:
      - bunx biome check --write .
      - task: terraform:format

  lint:
    desc: Lint codebase for style issues
    deps: [install]
    cmds:
      - bunx biome check .

  test:
    desc: Run application test suite
    cmds:
      - task: lint
      - task: build
      - task: test:e2e

  test:e2e:
    desc: Run end-to-end tests
    deps: [install, playwright]
    cmds:
      - bunx playwright test {{.CLI_ARGS}}

  playwright:
    desc: Install Playwright browsers
    internal: true
    cmd: bunx playwright install --with-deps

  dev:
    desc: Serve the Hugo development site
    cmds:
      - hugo server --port 8000 --buildDrafts

  clean:
    desc: Clear build cache and artifacts
    cmds:
      - rm -rf public resources

  build:
    desc: Build the Hugo production site
    generates:
      - public/
    env:
      HUGO_ENV: production
    cmds:
      - hugo --minify

  serve:
    desc: Serve the Hugo production site
    env:
      HUGO_ENV: production
    cmds:
      - hugo server --port 8000 --appendPort=false --disableLiveReload --renderToMemory
